name: paper-trading (manual auth check only)

# Scheduled trading was DISABLED 2026-07-11.
#
# The sole order-submitting scheduler is the local launchd job
# `com.rimrim.hunt2026-paper` (scripts/hunt_paper_run.py --live, weekdays 20:30 PT,
# followed by hunt_paper_reconcile.py). That is the single writer of the paper book.
#
# This workflow previously ran a *second*, independent live path on a cron
# (scripts/paper_book_run.py --live, the retired stat-arb runner) and committed
# ledgers/dashboard back to main — two schedulers trading one book. The cron and
# the live/commit steps are removed. What remains is a manual, read-only auth
# smoke test: it runs `paper_book_run.py --check` only, never `--live`, and writes
# nothing back to the repo.

on:
  workflow_dispatch:

concurrency:
  group: paper-trading
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  paper:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - run: pip install -e ".[paper]"

      - name: paper auth check (read-only, never --live)
        env:
          ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_API_SECRET_KEY: ${{ secrets.ALPACA_API_SECRET_KEY }}
        run: python scripts/paper_book_run.py --check
